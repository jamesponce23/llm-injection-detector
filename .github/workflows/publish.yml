name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.1.0, v1.2.3, etc.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  publish:
    needs: test   # only publish if tests pass
    runs-on: ubuntu-latest
    environment: pypi   # requires manual approval in GitHub settings
    permissions:
      id-token: write   # required for trusted publishing (no API key needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API key needed — uses PyPI Trusted Publishing (OIDC)
